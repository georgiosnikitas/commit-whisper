sonar.projectKey=georgiosnikitas_commit-whisper
sonar.organization=georgiosnikitas

sonar.sources=src
sonar.tests=src,tests
sonar.test.inclusions=**/*.test.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Generated / non-source paths excluded from analysis.
sonar.exclusions=dist/**,dist-sea/**,coverage/**,docs/**,_bmad/**,scripts/**,.agents/**

# Reviewed Security Hotspot accepted as test-only intent (files stay under
# analysis so coverage/quality still count): typescript:S4036 — the local
# integration test invokes the system `git` binary by name (resolved via PATH).
# Cross-platform CI needs a PATH lookup rather than a hard-coded absolute path,
# and the runner PATH is trusted.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S4036
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.test.ts

