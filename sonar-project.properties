sonar.projectKey=georgiosnikitas_commit-whisper
sonar.organization=georgiosnikitas

sonar.sources=src
sonar.tests=src,tests
sonar.test.inclusions=**/*.test.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Generated / non-source paths excluded from analysis.
sonar.exclusions=dist/**,dist-sea/**,coverage/**,docs/**,_bmad/**,scripts/**,.agents/**

# Accepted deprecation (documented, deliberate): src/narrate/generate.ts wraps the
# AI SDK `generateObject`, which ai@6 marks @deprecated in favour of `generateText`
# + output. The architecture/ACs name `generateObject` explicitly, it remains
# functional, and the migration is tracked separately (see the file header). Scope
# the S1874 suppression to this one file so the decision lives in one place.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S1874
sonar.issue.ignore.multicriteria.e1.resourceKey=src/narrate/generate.ts

