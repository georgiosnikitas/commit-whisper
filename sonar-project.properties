sonar.projectKey=georgiosnikitas_commit-whisper
sonar.organization=georgiosnikitas

sonar.sources=src
sonar.tests=src,tests
sonar.test.inclusions=**/*.test.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Generated / non-source paths excluded from analysis.
sonar.exclusions=dist/**,dist-sea/**,coverage/**,docs/**,_bmad/**,scripts/**,.agents/**

# Accepted false positives (documented, intentional design — not fixable without regressions).
# e1 · S7785 (prefer top-level await): the SEA entry is bundled to CommonJS, where a Node
#      SEA main forbids top-level await — the `.then()` chain is mandatory, not a choice.
# e2 · S6564 (redundant type alias): `IsoDate` is an intentional domain contract type
#      (the architecture's single ISO-8601 anchor, brandable later) — kept by design.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S7785
sonar.issue.ignore.multicriteria.e1.resourceKey=src/sea-entry.ts
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S6564
sonar.issue.ignore.multicriteria.e2.resourceKey=src/config/run-config.ts
