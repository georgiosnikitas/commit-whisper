# Build the Node SEA single-executable binaries for macOS, Linux, and Windows
# (Story 7.4 — the release CI matrix). Each runner builds + smoke-tests its own
# native binary, then uploads it as an artifact. On a `v*` tag, a final job
# attaches all three to the GitHub Release.
#
# Why this works on CI without the local Homebrew workaround: `actions/setup-node`
# installs an OFFICIAL Node.js build (from nodejs.org), which embeds the SEA fuse
# sentinel — so `scripts/build-sea.mjs` uses `process.execPath` directly (no
# COMMIT_WHISPER_SEA_NODE override needed).
name: Release

on:
  workflow_dispatch: {} # manual runs (build artifacts without a tag)
  push:
    tags:
      - "v*" # a version tag triggers a full build + release attach

jobs:
  test:
    name: gate (typecheck · lint · unit tests)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up an official Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck · lint · unit tests
        run: |
          npm run typecheck
          npm run lint
          npm test

  build:
    name: build (${{ matrix.os }})
    needs: test
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout (full history for the git-analysis smoke test)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up an official Node.js (has the SEA fuse)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the SEA binary
        run: npm run build:sea

      - name: Smoke-test the packaged binary
        shell: bash
        run: |
          set -euo pipefail
          BIN="dist-sea/commit-whisper"
          [ "$RUNNER_OS" = "Windows" ] && BIN="dist-sea/commit-whisper.exe"
          echo "--- version ---"
          "./$BIN" --version
          echo "--- help (ANSI / commander) ---"
          "./$BIN" --help > /dev/null
          echo "--- git shell-out + analysis from the binary (AC2) ---"
          # Write to a file (NOT a pipe): `grep -q` would close the pipe early and
          # SIGPIPE the still-writing binary → exit 141 → pipefail fails a valid build.
          "./$BIN" . --no-ai --format json -o report.json
          grep -q '"schemaVersion"' report.json
          rm -f report.json
          echo "OK: the binary analyzed this repo via the system git shell-out."

      - name: Name the binary per platform/arch
        id: name
        shell: bash
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            Linux)   OS=linux ;;
            macOS)   OS=macos ;;
            Windows) OS=windows ;;
            *)       OS="$(echo "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')" ;;
          esac
          ARCH="$(echo "$RUNNER_ARCH" | tr '[:upper:]' '[:lower:]')" # x64 | arm64
          EXT=""
          [ "$RUNNER_OS" = "Windows" ] && EXT=".exe"
          ASSET="commit-whisper-${OS}-${ARCH}${EXT}"
          cp "dist-sea/commit-whisper${EXT}" "$ASSET"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"

      - name: Upload the binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.name.outputs.asset }}
          path: ${{ steps.name.outputs.asset }}
          if-no-files-found: error

  release:
    name: attach binaries to the release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/upload to the GitHub Release
    steps:
      - name: Download all platform binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Attach to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Create the release if a tag was pushed without one, else reuse it.
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --generate-notes
          gh release upload "$TAG" artifacts/* --repo "$GITHUB_REPOSITORY" --clobber

  publish-npm:
    name: publish to npm
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + provenance (no NPM_TOKEN needed)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js (npm registry)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Trusted publishing (OIDC) needs a recent npm; the Node 22 default ships an older one.
      - name: Upgrade npm (trusted publishing support)
        run: npm install -g npm@latest

      - name: Build the publishable bundle
        run: npm run build

      # Tokenless OIDC trusted publishing — no long-lived secret in CI. This requires the
      # package to already exist on npm with a trusted publisher configured for this
      # workflow; the very first release is bootstrapped once via an interactive
      # `npm login` publish from a maintainer's machine. The guard keeps re-runs idempotent.
      - name: Publish to npm (trusted publishing, provenance, public)
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "commit-whisper@${VERSION}" --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "commit-whisper@${VERSION} already published — skipping."
          else
            npm publish --provenance --access public
          fi

  publish-github-packages:
    name: publish to GitHub Packages
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # publish to the repo's GitHub Packages registry
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js (GitHub Packages registry)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: "https://npm.pkg.github.com"
          scope: "@georgiosnikitas"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the publishable bundle
        run: npm run build

      # GitHub Packages requires a scoped name owned by the org/user. Rename only
      # the in-CI package.json (npm keeps the unscoped `commit-whisper` name) before publishing.
      - name: Scope the package for GitHub Packages
        run: npm pkg set name="@georgiosnikitas/commit-whisper"

      - name: Publish to GitHub Packages
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    name: update the Homebrew tap
    needs: publish-npm # the npm tarball must exist on the registry first
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read # the tap repo is written via HOMEBREW_TAP_TOKEN, not GITHUB_TOKEN
    steps:
      - name: Extract the version from the tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Checksum the published npm tarball
        id: sha
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="https://registry.npmjs.org/commit-whisper/-/commit-whisper-${VERSION}.tgz"
          # publish-npm has run, but the registry CDN can lag a few seconds — retry briefly.
          SHA256=""
          for _ in $(seq 1 10); do
            if SHA256="$(curl -fsSL "$TARBALL" | shasum -a 256 | awk '{print $1}')" && [ -n "$SHA256" ]; then
              break
            fi
            sleep 6
          done
          EMPTY="e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
          if [ -z "$SHA256" ] || [ "$SHA256" = "$EMPTY" ]; then
            echo "ERROR: could not fetch/checksum commit-whisper@${VERSION} from npm" >&2
            exit 1
          fi
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Check out the Homebrew tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: georgiosnikitas/homebrew-commit-whisper
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Regenerate the formula from the npm tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          set -euo pipefail
          mkdir -p Formula
          cat > Formula/commit-whisper.rb << 'HEAD_EOF'
          # Homebrew formula for commit-whisper — installs the published npm tarball and
          # runs on Homebrew's Node.js. Regenerated on every release by CI.
          class CommitWhisper < Formula
            desc "Deterministic git history analysis with a grounded, BYOK AI narrative"
            homepage "https://github.com/georgiosnikitas/commit-whisper"
          HEAD_EOF
          cat >> Formula/commit-whisper.rb << DYNAMIC_EOF
            url "https://registry.npmjs.org/commit-whisper/-/commit-whisper-${VERSION}.tgz"
            sha256 "${SHA256}"
          DYNAMIC_EOF
          cat >> Formula/commit-whisper.rb << 'TAIL_EOF'
            license "MIT"

            depends_on "node"

            def install
              system "npm", "install", *std_npm_args
              bin.install_symlink Dir["#{libexec}/bin/*"]
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/commit-whisper --version")
            end
          end
          TAIL_EOF
          echo "--- regenerated formula ---"
          cat Formula/commit-whisper.rb

      - name: Commit and push the updated formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/commit-whisper.rb
          if git diff --staged --quiet; then
            echo "Formula already current — nothing to commit."
          else
            git commit -m "commit-whisper ${VERSION}"
            git push
          fi

